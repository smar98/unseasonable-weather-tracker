name: Refresh anomaly dataset

on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update data (incremental)
        run: python scripts/build_dataset.py --mode update
      - name: Commit changed dataset
        run: |
          git add data_cache public/data
          if git diff --cached --quiet; then
            echo "No dataset changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update anomaly dataset"
          git push
