name: Refresh anomaly dataset

on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate data
        run: python scripts/build_dataset.py
      - name: Commit changed dataset
        run: |
          if git diff --quiet -- public/data/anomaly_summary.json; then
            echo "No dataset changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/anomaly_summary.json
          git commit -m "Update anomaly dataset"
          git push
